name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: CLI smoke test
        run: |
          node bin/pandect.mjs --version
          node bin/pandect.mjs --list
          node bin/pandect.mjs --help
      - name: Round-trip a rulebook
        shell: bash
        run: |
          node bin/pandect.mjs godot4 -o /tmp/RB.md
          test -s /tmp/RB.md
          head -1 /tmp/RB.md
