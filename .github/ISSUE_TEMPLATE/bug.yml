name: CLI bug
description: Something is wrong with the `pandect` CLI itself (not the rulebook content)
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: pandect version
      description: Output of `pandect --version` or `npx pandect --version`.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "v22.10.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.4 / Windows 11 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      render: sh
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
    validations:
      required: true
